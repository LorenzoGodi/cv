design:
    theme: sb2nov
    font: Charter
    font_size: 10pt
    page_size: a4paper
    color: '#004f90'
    disable_external_link_icons: false
    disable_page_numbering: true
    page_numbering_style: NAME - Pagina PAGE_NUMBER di TOTAL_PAGES
    disable_last_updated_date: false
    last_updated_date_style: 'Modificato: TODAY'
    header_font_size: 30 pt
    text_alignment: justified
    seperator_between_connections: ''
    use_icons_for_connections: true
    margins:
        page:
            top: 0.8 cm
            bottom: 0.4 cm
            left: 0.6 cm
            right: 0.6 cm
        section_title:
            top: 0.4 cm
            bottom: 0.2 cm
        entry_area:
            left_and_right: 0.2 cm
            vertical_between: 0.5 cm
            date_and_location_width: 7.5 cm
        highlights_area:
            top: 0.10 cm
            left: 0.2 cm
            vertical_between_bullet_points: 0.10 cm
        header:
            vertical_between_name_and_connections: 0.3 cm
            bottom: 0.3 cm
            horizontal_between_connections: 0.5 cm
