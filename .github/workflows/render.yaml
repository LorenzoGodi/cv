name: Render CVs

on:
  push:
    branches:
      - main
  workflow_dispatch: # to allow manual runs from the Actions tab
  workflow_call: # to make the workflow triggerable from other workflows (release.yaml)

permissions:
  contents: read

jobs:
  render:
    name: Render CVs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install Python dependencies
        run: pip install -r requirements.txt
      - name: Install TeX Live
        uses: zauguin/install-texlive@v4
        with:
          # Exact list of packages used to compile the CVs, derived from
          # a pdflatex -recorder run mapped through the TeX Live database:
          packages: >
            amsmath auxhook bigintcalc bitset bookmark changepage charter
            dvips enumitem eso-pic etoolbox fontawesome5 geometry
            gettitlestring graphics graphics-cfg graphics-def hycolor
            hyperref iftex infwarerr intcalc kpathsea kvdefinekeys
            kvoptions kvsetkeys l3backend l3kernel l3packages lastpage
            latex latex-bin lm ltxcmds needspace paracol pdfescape pdftex
            pdftexcmds psnfss refcount rerunfilecheck titlesec tools
            uniquecounter url xcolor
      - name: Render CVs
        env:
          CV_PHONE: ${{ secrets.CV_PHONE }}
        run: |
          shopt -s nullglob
          cv_files=(src/*_CV_*.yaml)
          if [ ${#cv_files[@]} -eq 0 ]; then
            echo "No CV files found!"
            exit 1
          fi
          for cv_file in "${cv_files[@]}"; do
            base=$(basename "$cv_file" .yaml)
            python render.py "$cv_file" --latex-path "$base.tex" --pdf-path "$base.pdf"
          done
      - name: Upload as an artifact
        uses: actions/upload-artifact@v4
        with:
          name: CV Output
          path: |
            ./*_CV_*.pdf
            ./*_CV_*.tex
